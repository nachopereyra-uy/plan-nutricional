<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Cocina de la semana</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --paper:#f5f5f1; --surface:#ffffff; --ink:#181b22; --muted:#6f7682; --line:#e8e8e2;
    --cal:#d2603f; --dob:#2f8f7f; --des:#7c8696;
    --cal-bg:#fbeee9; --dob-bg:#e7f3f0; --des-bg:#eef0f3;
    --disp:"Space Grotesk",system-ui,sans-serif;
    --body:"Inter",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.5;-webkit-tap-highlight-color:transparent}
  .wrap{max-width:520px;margin:0 auto;padding:22px 16px 80px}

  header{margin-bottom:18px}
  .title{font-family:var(--disp);font-weight:700;font-size:23px;letter-spacing:-.02em;margin:0}
  .sub{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:5px}

  .legend{display:flex;gap:14px;margin:14px 0 18px;flex-wrap:wrap}
  .lg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}

  .weeknav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .wlabel{font-family:var(--disp);font-weight:600;font-size:16px}
  .wlabel span{color:var(--muted);font-weight:500}
  .arrow{width:38px;height:38px;border:1px solid var(--line);background:var(--surface);border-radius:11px;font-size:18px;line-height:1;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .arrow:active{background:var(--paper)}
  .arrow:disabled{opacity:.32;cursor:default}
  .dots{display:flex;gap:7px;justify-content:center;margin:0 0 16px}
  .pdot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:.2s}
  .pdot.on{background:var(--ink);width:20px;border-radius:4px}

  .hint{font-size:12.5px;color:var(--muted);line-height:1.45;margin-bottom:14px;padding:0 2px}
  .hint b{color:var(--ink);font-weight:600}

  .turns{display:flex;gap:6px;margin:0 0 9px}
  .turn{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
  .turn.on{border-color:transparent;font-weight:500}
  .turn.off{text-decoration:line-through;opacity:.7}

  .tools{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .toolbtn{display:flex;align-items:center;gap:6px;border:1px dashed var(--line);background:var(--surface);color:var(--ink);border-radius:12px;padding:12px 13px;font-family:var(--body);font-size:13.5px;font-weight:600;cursor:pointer}
  .toolbtn .chev{margin-left:auto;color:var(--muted);font-weight:400}
  .toolbtn:active{background:var(--paper)}

  .days{display:flex;flex-direction:column;gap:12px}
  .days.anim{animation:slide .26s ease}
  @keyframes slide{from{opacity:0;transform:translateX(var(--from,18px))}to{opacity:1;transform:none}}

  .day{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex}
  .spine{width:5px;flex:none}
  .daybody{flex:1;min-width:0;padding:13px 14px 6px}
  .dhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  .dname{font-family:var(--disp);font-weight:600;font-size:16px}
  .chip{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:20px;font-weight:500}

  .meal{display:grid;grid-template-columns:82px 1fr 14px;align-items:center;gap:8px;padding:9px 2px;border-top:1px solid var(--line);cursor:pointer}
  .meal:first-of-type{border-top:none}
  .meal:active{background:var(--paper)}
  .mlabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);line-height:1.25}
  .mname{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chev{color:var(--line);font-size:15px;text-align:right}

  /* bottom sheet */
  .scrim{position:fixed;inset:0;background:rgba(20,22,28,.42);opacity:0;pointer-events:none;transition:opacity .22s;z-index:10}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:11;background:var(--surface);border-radius:20px 20px 0 0;padding:8px 20px 30px;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-width:520px;margin:0 auto;max-height:82vh;overflow:auto}
  .sheet.open{transform:none}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 16px}
  .sh-tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .sh-title{font-family:var(--disp);font-weight:600;font-size:20px;letter-spacing:-.01em;margin:4px 0 16px}
  .qrow{display:flex;align-items:flex-end;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
  .qrow .qn{flex:none;max-width:48%}
  .qrow .qd{border-bottom:1px dotted var(--line);flex:1;margin:0 2px 5px;min-width:8px}
  .qrow .qq{font-family:var(--mono);font-weight:500;font-size:13.5px;text-align:right;max-width:52%}
  .sh-grouptitle{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:18px 0 2px}
  .sh-note{margin-top:16px;font-size:13px;color:var(--muted);line-height:1.5;background:var(--paper);border-radius:10px;padding:11px 13px}

  @media (prefers-reduced-motion: reduce){
    .days.anim{animation:none}
    .sheet,.scrim{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="title">Cocina de la semana</h1>
    <div class="sub">Maratón BA · batch cooking</div>
    <div class="legend">
      <div class="lg"><span class="dot" style="background:var(--dob)"></span>Doble · trote + pesas</div>
      <div class="lg"><span class="dot" style="background:var(--cal)"></span>Calidad · cargás</div>
      <div class="lg"><span class="dot" style="background:var(--des)"></span>Descanso · liviano</div>
    </div>
  </header>

  <div class="weeknav">
    <button class="arrow" id="prev" aria-label="Semana anterior">‹</button>
    <div class="wlabel" id="wlabel">Semana 1 <span>/ 4</span></div>
    <button class="arrow" id="next" aria-label="Semana siguiente">›</button>
  </div>
  <div class="dots" id="dots"></div>

  <div class="tools">
    <button class="toolbtn" id="prepBtn">Qué cocinar<span class="chev">›</span></button>
    <button class="toolbtn" id="shopBtn">Lista de compras<span class="chev">›</span></button>
  </div>

  <div class="hint">Tocá <b>Mañana</b> o <b>Tarde</b> en un día si faltaste a ese turno; las comidas se reacomodan.</div>

  <div class="days" id="days"></div>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="grab"></div>
  <div id="sheetContent"></div>
</div>

    [["Lun","dob","pollo_arroz","tarta_ensalada"],["Mar","cal","quinoa_pescado","huevos_arroz"],["Mié","dob","tarta_ensalada","pollo_boniato"],["Jue","cal","pasta_huevos","pescado_quinoa"],["Vie","dob","pollo_arroz","huevos_hummus"],["Sáb","cal","quinoa_boniato_pescado","cena_salmon"],["Dom","des","tarta_verduras","pescado_plancha"]],
    [["Lun","dob","milanesa_boniato","lentejas_ensalada"],["Mar","cal","fideos_tofu","huevos_boniato"],["Mié","dob","lentejas_arroz","milanesa_pure"],["Jue","cal","pasta_huevos","pescado_fideos"],["Vie","dob","pescado_boniato","milanesa_verduras"],["Sáb","cal","quinoa_boniato_pescado","cena_salmon"],["Dom","des","tarta_caprese","pescado_plancha"]],
    [["Lun","dob","tofu_arroz","tarta_ensalada"],["Mar","cal","quinoa_pescado","huevos_arroz"],["Mié","dob","tarta_ensalada","pollo_quinoa"],["Jue","cal","pasta_huevos","pescado_arroz"],["Vie","dob","pescado_arroz","carne_verduras"],["Sáb","cal","quinoa_salmon_hummus","cena_salmon"],["Dom","des","tarta_verduras","pescado_plancha"]],
    [["Lun","dob","pollo_fideos","tarta_caprese"],["Mar","cal","garbanzos_arroz","huevos_boniato"],["Mié","dob","tarta_ensalada","pollo_boniato"],["Jue","cal","pasta_huevos","pescado_fideos"],["Vie","dob","pescado_boniato","garbanzos_ensalada"],["Sáb","cal","quinoa_boniato_pescado","cena_salmon"],["Dom","des","tarta_verduras","pescado_plancha"]]
  ];

  var TYPE = {dob:{label:"Doble",color:"var(--dob)",bg:"var(--dob-bg)"},cal:{label:"Calidad",color:"var(--cal)",bg:"var(--cal-bg)"},des:{label:"Descanso",color:"var(--des)",bg:"var(--des-bg)"}};

  var wi = 0, fromDir = 1;
  var daysEl=document.getElementById("days"), dotsEl=document.getElementById("dots"),
      wlabel=document.getElementById("wlabel"), prev=document.getElementById("prev"), next=document.getElementById("next");

  // per-day training state, keyed by week+day. default: trained both turns.
  var state={};
  function getState(di){ var k=wi+"-"+di; if(!state[k]) state[k]={am:true,pm:true}; return state[k]; }

  function mealsFor(day, st){
    var type=day[1];
    var hasAM=(type==="cal"||type==="dob"), hasPM=(type==="dob");
    var trainAM=hasAM && st.am;
    var trainPM=hasPM && st.pm;
    var rows=[];
    if(trainAM){ rows.push(["PRE", type==="cal"?"pre_cal":"pre_dob"]); rows.push(["POST", type==="cal"?"post_cal":"post_dob"]); }
    else { rows.push(["DESAYUNO","desayuno"]); }
    rows.push(["ALMUERZO",day[2]]);
    if(trainPM){ rows.push(["PRE GIMNASIO","snack"]); }
    rows.push(["MERIENDA","merienda"]);
    rows.push(["CENA",day[3]]);
    return rows;
  }

  function turnPill(kind, on){
    var lbl=kind==="am"?"Mañana":"Tarde";
    var cls="turn "+(on?"on":"off");
    var style=on?' style="background:var(--paper);color:var(--ink)"':'';
    return '<button class="'+cls+'" data-turn="'+kind+'"'+style+'>'+(on?"✓ ":"")+lbl+"</button>";
  }

  function buildCard(day, di){
    var type=day[1], t=TYPE[type], st=getState(di);
    var hasAM=(type==="cal"||type==="dob"), hasPM=(type==="dob");
    var card=document.createElement("div"); card.className="day"; card.dataset.di=di;
    var turns="";
    if(hasAM||hasPM){
      turns='<div class="turns">'+(hasAM?turnPill("am",st.am):"")+(hasPM?turnPill("pm",st.pm):"")+'</div>';
    }
    var rows=mealsFor(day, st).map(function(r){
      var dish=D[r[1]];
      return '<div class="meal" data-id="'+r[1]+'"><span class="mlabel">'+r[0]+'</span><span class="mname">'+dish.name+'</span><span class="chev">›</span></div>';
    }).join("");
    card.innerHTML='<div class="spine" style="background:'+t.color+'"></div>'+
      '<div class="daybody"><div class="dhead"><span class="dname">'+day[0]+
      '</span><span class="chip" style="color:'+t.color+';background:'+t.bg+'">'+t.label+'</span></div>'+
      turns+rows+'</div>';
    return card;
  }

  function render(){
    var week=WEEKS[wi];
    wlabel.innerHTML="Semana "+(wi+1)+" <span>/ 4</span>";
    prev.disabled=wi===0; next.disabled=wi===WEEKS.length-1;

    dotsEl.innerHTML="";
    WEEKS.forEach(function(_,i){var d=document.createElement("div");d.className="pdot"+(i===wi?" on":"");dotsEl.appendChild(d);});

    daysEl.style.setProperty("--from",(fromDir>0?18:-18)+"px");
    daysEl.classList.remove("anim"); void daysEl.offsetWidth; daysEl.classList.add("anim");

    daysEl.innerHTML="";
    week.forEach(function(day,di){ daysEl.appendChild(buildCard(day,di)); });
  }

  // ---- bottom sheet ----
  var scrim=document.getElementById("scrim"), sheet=document.getElementById("sheet"), sc=document.getElementById("sheetContent");
  function qrow(it){ var q=it.q?'<span class="qq">'+it.q+'</span>':''; return '<div class="qrow"><span class="qn">'+it.n+'</span><span class="qd"></span>'+q+'</div>'; }
  function openSheet(obj){
    var html="";
    if(obj.tag) html+='<div class="sh-tag">'+obj.tag+'</div>';
    html+='<div class="sh-title">'+obj.name+'</div>';
    if(obj.groups){ obj.groups.forEach(function(g){ html+='<div class="sh-grouptitle">'+g.t+'</div>'; g.items.forEach(function(it){html+=qrow(it);}); }); }
    else { obj.items.forEach(function(it){html+=qrow(it);}); }
    if(obj.note) html+='<div class="sh-note">'+obj.note+'</div>';
    sc.innerHTML=html;
    scrim.classList.add("open"); sheet.classList.add("open");
  }
  function closeSheet(){ scrim.classList.remove("open"); sheet.classList.remove("open"); }
  scrim.addEventListener("click",closeSheet);

  daysEl.addEventListener("click",function(e){
    var tb=e.target.closest(".turn");
    if(tb){
      var card=tb.closest(".day"); var di=+card.dataset.di;
      var st=getState(di); st[tb.getAttribute("data-turn")]=!st[tb.getAttribute("data-turn")];
      card.replaceWith(buildCard(WEEKS[wi][di], di));
      return;
    }
    var m=e.target.closest(".meal"); if(!m) return;
    openSheet(D[m.getAttribute("data-id")]);
  });
  document.getElementById("prepBtn").addEventListener("click",function(){ openSheet(PREP[wi]); });
  document.getElementById("shopBtn").addEventListener("click",function(){ openSheet(shopFor(wi)); });

  function go(dir){ var n=wi+dir; if(n<0||n>=WEEKS.length) return; fromDir=dir; wi=n; render(); }
  prev.addEventListener("click",function(){go(-1);});
  next.addEventListener("click",function(){go(1);});
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowRight")go(1); if(e.key==="ArrowLeft")go(-1); if(e.key==="Escape")closeSheet(); });

  // ---- swipe ----
  var x0=null,y0=null;
  daysEl.addEventListener("touchstart",function(e){var t=e.changedTouches[0];x0=t.clientX;y0=t.clientY;},{passive:true});
  daysEl.addEventListener("touchend",function(e){
    if(x0===null)return; var t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0;
    if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)*1.4){ go(dx<0?1:-1); }
    x0=y0=null;
  },{passive:true});

  render();
})();
</script>
</body>
</html>
